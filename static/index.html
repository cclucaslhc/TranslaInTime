<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TranslaInTime</title>
    <link rel="stylesheet" href="/static/styles.css?v=5" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <h1>TranslaInTime</h1>
          <p id="runtime">本地实时语音翻译字幕</p>
        </div>
        <div class="status" id="status">未连接</div>
      </section>

      <section class="controls" aria-label="字幕控制">
        <label>
          源语言
          <select id="sourceLanguage">
            <option value="auto">自动检测</option>
            <option value="en" selected>英语</option>
            <option value="zh">中文</option>
            <option value="ja">日语</option>
            <option value="ko">韩语</option>
            <option value="fr">法语</option>
            <option value="de">德语</option>
            <option value="es">西语</option>
          </select>
        </label>
        <label>
          目标字幕
          <select id="targetLanguage">
            <option value="zh">中文</option>
            <option value="en">English</option>
          </select>
        </label>
        <label>
          分段
          <select id="chunkSeconds">
            <option value="0.8">0.8 秒</option>
            <option value="1.2" selected>1.2 秒</option>
            <option value="2.0">2 秒</option>
            <option value="3.0">3 秒</option>
          </select>
        </label>
        <label class="toggle">
          <input id="speedMode" type="checkbox" checked />
          <span>速度优先</span>
        </label>
        <button id="startButton" title="Space">开始</button>
        <button id="monitorButton" title="M">检测麦克风</button>
        <button id="stopButton" title="Esc" disabled>停止</button>
        <button id="clearButton" title="C">清空</button>
      </section>

      <section class="mic-check">
        <div class="section-title">麦克风检测</div>
        <div class="meter-grid">
          <div class="meter-card">
            <div class="meter-head">
              <span>浏览器采集</span>
              <strong id="localLevelText">未开始</strong>
            </div>
            <div class="meter"><div id="localMeter" class="meter-fill"></div></div>
            <div id="localStats" class="meter-stats">本地包 0 · Peak 0.000</div>
          </div>
          <div class="meter-card">
            <div class="meter-head">
              <span>后端接收</span>
              <strong id="serverLevelText">未收到</strong>
            </div>
            <div class="meter"><div id="serverMeter" class="meter-fill server"></div></div>
            <div id="serverStats" class="meter-stats">后端包 0 · 0 ms</div>
          </div>
        </div>
      </section>

      <section class="subtitle" aria-live="polite">
        <div class="caption-label">翻译字幕</div>
        <div id="translation" class="translation">等待麦克风输入</div>
        <div id="original" class="original"></div>
        <div id="metrics" class="metrics">重复过滤 0 条</div>
      </section>

      <section class="history-wrap">
        <div class="section-title">字幕历史</div>
        <div class="history" id="history"></div>
      </section>

      <section class="log" id="log"></section>
    </main>

    <script src="/static/app.js?v=5"></script>
  </body>
</html>
